name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request_target:
    types:
      - opened
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build --build-arg BUILD_ID=${{ github.sha }} -t ${{ secrets.DOCKERHUB_USER }}/vue-app:${{ github.sha }} .

      - name: Build Docker image latest
        run: docker build --build-arg BUILD_ID=latest -t ${{ secrets.DOCKERHUB_USER }}/vue-app .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USER }}/vue-app:${{ github.sha }}

      - name: Push Docker image latest
        run: docker push ${{ secrets.DOCKERHUB_USER }}/vue-app

  deploy:
    if: ${{ github.ref == 'refs/heads/main' && github.event.name == "push"}}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'robyn-appservice-linux'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.DOCKERHUB_USER }}/vue-app:${{ github.sha }}'
